<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermantown Data Center Timeline</title>
    <meta
      name="description"
      content="Interactive public timeline for Hermantown data center milestones."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="timeline-app" aria-labelledby="page-title">
      <header class="app-header">
        <div class="header-copy">
          <p class="eyebrow">Project timeline</p>
          <h1 id="page-title">Hermantown Data Center Timeline</h1>
          <p id="timeline-summary" class="summary-text">
            This timeline is a community-led best effort at tracking the changes
            and developments of the Hermantown Data Cetner project.
          </p>
        </div>
      </header>

      <section class="controls" aria-label="Timeline controls">
        <label class="search-control">
          <span>Search</span>
          <input
            id="search-input"
            type="search"
            placeholder="Search milestones or notes"
            autocomplete="off"
          />
        </label>

        <label class="select-control">
          <span>Year</span>
          <select id="year-filter">
            <option value="all">All years</option>
          </select>
        </label>

        <label class="select-control">
          <span>Order</span>
          <select id="sort-order">
            <option value="desc">Newest first</option>
            <option value="asc">Oldest first</option>
          </select>
        </label>

        <button id="expand-toggle" class="secondary-button" type="button">
          Expand all
        </button>
      </section>

      <section class="timeline-shell" aria-live="polite">
        <div id="empty-state" class="empty-state" hidden>
          No timeline events match the current filters.
        </div>
        <ol id="timeline-list" class="timeline-list"></ol>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
